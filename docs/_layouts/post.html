---
layout: default
---

<article class="blog-post">
    <div class="post-header">
        <div class="post-meta">
            <span class="post-date">{{ page.date | date: "%B %d, %Y" }}</span>
            {% if page.author %}
            <span class="post-author">by {{ page.author }}</span>
            {% endif %}
        </div>
        <h1>{{ page.title }}</h1>
        {% if page.excerpt %}
        <p class="post-excerpt">{{ page.excerpt }}</p>
        {% endif %}
    </div>

    <div class="post-content">
        {{ content }}
    </div>

    <div class="post-footer">
        <a href="{{ '/blog/' | relative_url }}" class="back-link">← Back to Blog</a>
    </div>
</article>

<style>
.blog-post {
    max-width: 800px;
    margin: 0 auto;
    padding: 4rem 2rem;
}

.post-header {
    margin-bottom: 3rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid var(--border-color);
}

.post-meta {
    display: flex;
    gap: 1.5rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-bottom: 1rem;
}

.post-header h1 {
    font-size: 2.5rem;
    margin-bottom: 1rem;
    color: var(--text-primary);
}

.post-excerpt {
    font-size: 1.15rem;
    color: var(--text-muted);
    font-style: italic;
}

.post-content {
    line-height: 1.8;
}

.post-content h1,
.post-content h2,
.post-content h3 {
    color: var(--text-primary);
    margin-top: 2.5rem;
    margin-bottom: 1rem;
}

.post-content h1 {
    font-size: 2rem;
    border-bottom: 2px solid var(--accent-blue);
    padding-bottom: 0.5rem;
}

.post-content h2 {
    font-size: 1.75rem;
    color: var(--accent-gold);
}

.post-content h3 {
    font-size: 1.4rem;
}

.post-content p {
    margin-bottom: 1.5rem;
}

.post-content ul,
.post-content ol {
    margin-bottom: 1.5rem;
    padding-left: 2rem;
}

.post-content li {
    margin-bottom: 0.5rem;
    color: var(--text-muted);
}

.post-content code {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg-darker);
    padding: 0.2rem 0.4rem;
    border-radius: 4px;
    font-size: 0.9em;
    color: var(--accent-blue-bright);
}

.post-content pre {
    background: var(--bg-darker);
    border: 1px solid var(--border-accent);
    border-left: 3px solid var(--accent-blue);
    border-radius: 8px;
    padding: 1.5rem;
    margin: 1.5rem 0;
    overflow-x: auto;
}

.post-content pre code {
    background: none;
    padding: 0;
    color: var(--text-primary);
}

.post-content blockquote {
    border-left: 4px solid var(--accent-gold);
    padding-left: 1.5rem;
    margin: 1.5rem 0;
    color: var(--text-muted);
    font-style: italic;
}

.post-content a {
    color: var(--accent-blue);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
}

.post-content a:hover {
    border-bottom-color: var(--accent-blue);
}

.post-content hr {
    border: none;
    height: 1px;
    background: var(--border-color);
    margin: 3rem 0;
}

.post-footer {
    margin-top: 4rem;
    padding-top: 2rem;
    border-top: 1px solid var(--border-color);
}

.back-link {
    color: var(--accent-blue);
    text-decoration: none;
    font-weight: 500;
    transition: color 0.2s;
}

.back-link:hover {
    color: var(--accent-blue-bright);
}
</style>
